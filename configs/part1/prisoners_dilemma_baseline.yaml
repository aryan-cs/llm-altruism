experiment:
  name: "pd-baseline-cross-family"
  part: 1
  game: "prisoners_dilemma"
  rounds: 10
  repetitions: 2

  history:
    mode: "full"
    window_size: 10

  pairings:
    - [{model: "llama-3.3-70b", provider: "cerebras"}, {model: "meta/llama-3.1-8b-instruct", provider: "nvidia"}]
    - [{model: "llama-3.3-70b", provider: "cerebras"}, {model: "llama3.2:3b", provider: "ollama"}]
    - [{model: "meta/llama-3.1-8b-instruct", provider: "nvidia"}, {model: "llama3.2:3b", provider: "ollama"}]

  prompt_variants:
    - name: "neutral"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    - name: "cooperative"
      system_prompt: "prompts/system/cooperative.txt"
      framing: "prompts/framing/community.txt"
      persona: "prompts/persona/community_leader.txt"
    - name: "competitive"
      system_prompt: "prompts/system/competitive.txt"
      framing: "prompts/framing/adversarial.txt"
      persona: "prompts/persona/strategist.txt"

  parameters:
    temperature: [0.0, 0.7]
    payoff_visibility: true
    max_tokens: 300
    seed: 7
