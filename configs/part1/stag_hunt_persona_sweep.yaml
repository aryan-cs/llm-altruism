experiment:
  name: "stag-hunt-persona-sweep"
  part: 1
  game: "stag_hunt"
  rounds: 8
  repetitions: 2

  history:
    mode: "summarized"
    window_size: 5

  pairings:
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "llama3.2:3b", provider: "ollama"}]
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "openai/gpt-oss-20b:free", provider: "openrouter"}, {model: "openai/gpt-oss-20b:free", provider: "openrouter"}]

  prompt_variants:
    - name: "community-leader"
      system_prompt: "prompts/system/cooperative.txt"
      framing: "prompts/framing/community.txt"
      persona: "prompts/persona/community_leader.txt"
    - name: "grudge-holder"
      system_prompt: "prompts/system/competitive.txt"
      framing: "prompts/framing/adversarial.txt"
      persona: "prompts/persona/grudge_holder.txt"

  parameters:
    temperature: [0.3]
    payoff_visibility: true
    max_tokens: 300
    retry_on_rate_limit: true
    max_rate_limit_retries:
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 21
