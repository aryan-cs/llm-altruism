experiment:
  name: "pd-cross-family-sweep"
  part: 1
  game: "prisoners_dilemma"
  rounds: 12
  repetitions: 1

  history:
    mode: "windowed"
    window_size: 4

  pairings:
    - [{model: "zai-glm-4.7", provider: "cerebras"}, {model: "z-ai/glm4.7", provider: "nvidia"}]
    - [{model: "zai-glm-4.7", provider: "cerebras"}, {model: "google/gemma-3-12b-it:free", provider: "openrouter"}]
    - [{model: "z-ai/glm4.7", provider: "nvidia"}, {model: "google/gemma-3-12b-it:free", provider: "openrouter"}]
    - [{model: "google/gemma-3-12b-it:free", provider: "openrouter"}, {model: "llama3.2:3b", provider: "ollama"}]

  prompt_variants:
    - name: "analytical"
      system_prompt: "prompts/system/analytical.txt"
      framing: "prompts/framing/business.txt"
      persona: "prompts/persona/diplomat.txt"

  parameters:
    temperature: [0.0, 0.3]
    payoff_visibility: true
    max_tokens: 300
    retry_on_rate_limit: true
    max_rate_limit_retries:
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 11
