experiment:
  name: "pd-explicit-vs-indirect"
  part: 1
  game: "prisoners_dilemma"
  rounds: 8
  repetitions: 2

  history:
    mode: "full"
    window_size: 8

  pairings:
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]

  prompt_variants:
    - name: "explicit-game"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    - name: "indirect-fiction"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
      game_options:
        prompt_overrides:
          description: "prompts/games_variants/prisoners_dilemma/fiction_description.txt"
          round: "prompts/games_variants/prisoners_dilemma/fiction_round.txt"
        action_aliases:
          cooperate: "reinforce"
          defect: "withhold"

  parameters:
    temperature: [0.0]
    payoff_visibility: true
    max_tokens: 300
    retry_on_rate_limit: true
    max_rate_limit_retries:
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 17
