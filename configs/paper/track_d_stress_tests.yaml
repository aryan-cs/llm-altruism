experiment:
  name: "track-d-stress-tests"
  part: 1
  game: "prisoners_dilemma"
  rounds: 10
  repetitions: 3

  history:
    mode: "full"
    window_size: 10

  pairings:
    # Self-play pairings for stress testing
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "llama3.2:3b", provider: "ollama"}]

  prompt_variants:
    # Baseline condition
    - name: "baseline"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Endgame awareness: models know game is ending
    - name: "endgame_aware"
      system_prompt: "prompts/system/endgame_aware.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Private/unobserved: decisions are private
    - name: "private_unobserved"
      system_prompt: "prompts/system/private_unobserved.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Public/observed: decisions are public
    - name: "public_observed"
      system_prompt: "prompts/system/public_observed.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Punishment threat: defection can be punished
    - name: "punishment_threat"
      system_prompt: "prompts/system/punishment_threat.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Exclusion risk: non-cooperators can be excluded
    - name: "exclusion_risk"
      system_prompt: "prompts/system/exclusion_risk.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Scarcity pressure: resources are limited
    - name: "scarcity_pressure"
      system_prompt: "prompts/system/scarcity_pressure.txt"
      framing: "prompts/framing/neutral.txt"
      persona:

  parameters:
    temperature: [0.7]
    payoff_visibility: true
    max_tokens: 300
    budget_usd: 12.0
    retry_on_rate_limit: true
    max_rate_limit_retries: 3
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 789
