experiment:
  name: "track-e-disguised-stag-hunt"
  part: 1
  game: "stag_hunt"
  rounds: 10
  repetitions: 3

  history:
    mode: "full"
    window_size: 10

  pairings:
    # Self-play pairings for each model
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "llama3.2:3b", provider: "ollama"}]

  prompt_variants:
    # Canonical: Default game presentation
    - name: "canonical"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Unlabeled: Generic option-based framing (no game name)
    - name: "unlabeled"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
      game_options:
        prompt_overrides:
          description: "prompts/games_variants/stag_hunt/unlabeled_description.txt"
          round: "prompts/games_variants/stag_hunt/unlabeled_round.txt"
        action_aliases:
          hunt_stag: "option_a"
          hunt_hare: "option_b"
    # Research collaboration disguise
    - name: "research_disguise"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
      game_options:
        prompt_overrides:
          description: "prompts/games_variants/stag_hunt/research_description.txt"
          round: "prompts/games_variants/stag_hunt/research_round.txt"
        action_aliases:
          hunt_stag: "collaborate"
          hunt_hare: "independent"

  parameters:
    temperature: [0.0, 0.7]
    payoff_visibility: true
    max_tokens: 300
    budget_usd: 10.0
    retry_on_rate_limit: true
    max_rate_limit_retries: 3
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 456
