experiment:
  name: "track-b-prompt-susceptibility"
  part: 1
  game: "prisoners_dilemma"
  rounds: 10
  repetitions: 3

  history:
    mode: "full"
    window_size: 10

  pairings:
    # Self-play pairings only for susceptibility testing
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "llama3.2:3b", provider: "ollama"}]

  prompt_variants:
    # Minimal baseline
    - name: "minimal"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:
    # Cooperative variants
    - name: "cooperative"
      system_prompt: "prompts/system/cooperative.txt"
      framing: "prompts/framing/community.txt"
      persona: "prompts/persona/community_leader.txt"
    # Competitive variants
    - name: "competitive"
      system_prompt: "prompts/system/competitive.txt"
      framing: "prompts/framing/adversarial.txt"
      persona: "prompts/persona/strategist.txt"
    # Analytical variants
    - name: "analytical"
      system_prompt: "prompts/system/analytical.txt"
      framing: "prompts/framing/neutral.txt"
      persona: "prompts/persona/diplomat.txt"

  parameters:
    temperature: [0.0, 0.7]
    payoff_visibility: true
    max_tokens: 300
    budget_usd: 8.0
    retry_on_rate_limit: true
    max_rate_limit_retries: 3
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 123
