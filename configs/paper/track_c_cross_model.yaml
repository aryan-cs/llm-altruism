experiment:
  name: "track-c-cross-model"
  part: 1
  game: "prisoners_dilemma"
  rounds: 10
  repetitions: 3

  history:
    mode: "full"
    window_size: 10

  pairings:
    # All self-play pairings
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "llama3.2:3b", provider: "ollama"}]
    # All pairwise cross-model matchups
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "llama3.1-8b", provider: "cerebras"}, {model: "llama3.2:3b", provider: "ollama"}]
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "llama3.2:3b", provider: "ollama"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "llama3.2:3b", provider: "ollama"}]
    # Reverse pairings (A vs B and B vs A for asymmetric analysis)
    - [{model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "llama3.1-8b", provider: "cerebras"}]
    - [{model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "qwen-3-235b-a22b-instruct-2507", provider: "cerebras"}]
    - [{model: "llama3.2:3b", provider: "ollama"}, {model: "deepseek-ai/deepseek-v3.2", provider: "nvidia"}]

  prompt_variants:
    - name: "minimal_neutral"
      system_prompt: "prompts/system/minimal.txt"
      framing: "prompts/framing/neutral.txt"
      persona:

  parameters:
    temperature: [0.7]
    payoff_visibility: true
    max_tokens: 300
    budget_usd: 15.0
    retry_on_rate_limit: true
    max_rate_limit_retries: 3
    max_transient_retries: 6
    initial_retry_delay_seconds: 10
    max_retry_delay_seconds: 300
    seed: 321
